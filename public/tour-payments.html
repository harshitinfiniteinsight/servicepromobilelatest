<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Payments – Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f9fafb;color:#1a1a1a;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#f85520,#ff7340);color:#fff;padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-weight:800;font-size:16px}.hdr-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700}
.step-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dots{display:flex;gap:5px}.dot{width:22px;height:4px;border-radius:99px;background:#e5e7eb;transition:background .3s}.dot.on{background:#f85520}
.step-lbl{font-size:10px;font-weight:700;color:#9ca3af}
.screens{flex:1;position:relative;overflow:hidden}
.scr{position:absolute;inset:0;overflow-y:auto;opacity:0;transition:opacity .45s;pointer-events:none;background:#f9fafb}
.scr.active{opacity:1;pointer-events:auto}
.card{background:#fff;border-radius:14px;margin:8px 12px 0;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f3f4f6}
.row{display:flex;align-items:center;justify-content:space-between}
.badge{border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700}
.b-paid{background:#dcfce7;color:#15803d}.b-pending{background:#fef3c7;color:#b45309}.b-overdue{background:#fee2e2;color:#b91c1c}
.muted{font-size:10px;color:#9ca3af}
.btn-row{display:flex;gap:5px;margin-top:8px}
.btn{flex:1;border:1px solid #e5e7eb;background:#f9fafb;border-radius:8px;padding:6px;font-size:10px;font-weight:700;color:#374151;text-align:center}
.btn-p{background:#fff3ee;border-color:#ffd4c4;color:#f85520}.btn-g{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}.btn-r{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}
.divider{border:none;border-top:1px solid #f3f4f6;margin:8px 0}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-title">Invoices &amp; Payments</div><div class="hdr-btn">+ Invoice</div></div>
<div class="step-bar">
  <div class="dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="step-lbl" id="slbl">Step 1 of 4</div>
</div>
<div class="screens" id="screens"></div>
<script>
localStorage.setItem('isAuthenticated','true');localStorage.setItem('userType','merchant');
const BIZ_DATA={hvac:{t:'HVAC',s1:'AC Service Call',s2:'Filter Replacement',s3:'Duct Inspection',s4:'Refrigerant Top-Up',job:'AC Service Call + Filter Replacement',inv:'AC Service (2hr labour)'},plumbing:{t:'Plumbing',s1:'Pipe Repair',s2:'Drain Cleaning',s3:'Leak Detection',s4:'Water Heater Service',job:'Pipe Repair + Drain Cleaning',inv:'Pipe Repair (2hr labour)'},electrical:{t:'Electrical',s1:'Panel Inspection',s2:'Wiring Repair',s3:'Outlet Installation',s4:'Circuit Breaker Replace',job:'Panel Inspection + Wiring Repair',inv:'Electrical Inspection (2hr labour)'},landscaping:{t:'Landscaping',s1:'Lawn Mowing',s2:'Garden Maintenance',s3:'Tree Trimming',s4:'Irrigation Setup',job:'Lawn Mowing + Garden Maintenance',inv:'Lawn Mowing (2hr)'},cleaning:{t:'Cleaning',s1:'Deep Clean',s2:'Carpet Steam Clean',s3:'Move-Out Clean',s4:'Office Cleaning',job:'Deep Clean + Carpet Steam Clean',inv:'Deep Clean Service (3hr)'},carpentry:{t:'Carpentry',s1:'Cabinet Install',s2:'Door Repair',s3:'Deck Build',s4:'Trim Finish',job:'Cabinet Install + Trim Finish',inv:'Cabinet Installation (3hr labour)'},exterminators:{t:'Pest Control',s1:'Termite Treatment',s2:'Rodent Control',s3:'Ant Extermination',s4:'Bed Bug Treatment',job:'Termite Treatment + Ant Extermination',inv:'Termite Treatment (2hr)'},painter:{t:'Painting',s1:'Interior Paint',s2:'Exterior Paint',s3:'Cabinet Refinish',s4:'Deck Staining',job:'Interior Paint + Drywall Repair',inv:'Interior Paint (4hr labour)'},construction:{t:'Construction',s1:'Site Prep',s2:'Foundation Work',s3:'Framing',s4:'Concrete Pour',job:'Site Prep + Foundation Work',inv:'Foundation Work (day rate)'},roofing:{t:'Roofing',s1:'Roof Inspection',s2:'Shingle Replacement',s3:'Gutter Cleaning',s4:'Leak Repair',job:'Roof Inspection + Shingle Replacement',inv:'Roof Inspection (2hr)'},general:{t:'Service',s1:'Service Call',s2:'Maintenance Visit',s3:'Repair Work',s4:'Installation',job:'Service Call + Maintenance Visit',inv:'Service Call (2hr labour)'},other:{t:'Service',s1:'Service Call',s2:'Maintenance Visit',s3:'Repair Work',s4:'Installation',job:'Service Call + Maintenance Visit',inv:'Service Call (2hr labour)'}};
const bizType=localStorage.getItem('ob_biz_type')||'general';
const biz=BIZ_DATA[bizType]||BIZ_DATA.general;
const LABELS=['Invoice List','Invoice Detail','Collect Payment','Payment Received ✓'];
const NAMES=['Emma Davis','Robert Miller','Sarah Johnson','David Brown'];

function build(){
  const scr=document.getElementById('screens');
  // S1 List
  const s0=document.createElement('div');s0.className='scr';
  s0.innerHTML=`<div style="background:linear-gradient(135deg,#f85520,#ff7340);margin:8px 12px 0;border-radius:14px;padding:14px;color:#fff"><div style="font-size:11px;opacity:.8;font-weight:600;margin-bottom:2px">Collected this month</div><div style="font-size:26px;font-weight:800;margin-bottom:8px">$18,340</div><div style="display:flex;gap:0"><div style="flex:1;border-right:1px solid rgba(255,255,255,.25)"><div style="font-size:13px;font-weight:800">$3.2k</div><div style="font-size:9px;opacity:.8">Outstanding</div></div><div style="flex:1;padding-left:12px"><div style="font-size:13px;font-weight:800">94%</div><div style="font-size:9px;opacity:.8">Paid on time</div></div></div></div>
  <div class="card"><div class="row"><div class="muted">#INV-2024-0142</div><span class="badge b-paid">✓ Paid</span></div><div style="font-size:13px;font-weight:700;margin:4px 0 1px">${NAMES[0]}</div><div style="font-size:11px;color:#6b7280;margin-bottom:4px">${biz.job}</div><div class="row"><div class="muted">Paid Jan 25 · Card ••4872</div><div style="font-size:14px;font-weight:800;color:#16a34a">$485.00</div></div><div class="btn-row"><div class="btn btn-g">View</div><div class="btn">Receipt</div></div></div>
  <div class="card"><div class="row"><div class="muted">#INV-2024-0141</div><span class="badge b-overdue">Overdue</span></div><div style="font-size:13px;font-weight:700;margin:4px 0 1px">${NAMES[1]}</div><div style="font-size:11px;color:#6b7280;margin-bottom:4px">${biz.s1} + ${biz.s2}</div><div class="row"><div class="muted">Due Jan 15 · 15 days late</div><div style="font-size:14px;font-weight:800;color:#b91c1c">$320.00</div></div><div class="btn-row"><div class="btn btn-r">Collect Now</div><div class="btn btn-g">Remind</div></div></div>
  <div class="card" style="margin-bottom:12px"><div class="row"><div class="muted">#INV-2024-0140</div><span class="badge b-pending">Pending</span></div><div style="font-size:13px;font-weight:700;margin:4px 0 1px">${NAMES[3]}</div><div style="font-size:11px;color:#6b7280;margin-bottom:4px">${biz.s3} + ${biz.s4}</div><div class="row"><div class="muted">Due Feb 2, 2024</div><div style="font-size:14px;font-weight:800;color:#b45309">$285.00</div></div><div class="btn-row"><div class="btn btn-p">Collect</div><div class="btn">Send Link</div></div></div>`;
  scr.appendChild(s0);
  // S2 Detail
  const s1=document.createElement('div');s1.className='scr';
  s1.innerHTML=`<div style="background:linear-gradient(135deg,#f85520,#ff7340);padding:14px;color:#fff"><div style="font-size:10px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Invoice · Overdue</div><div style="font-size:17px;font-weight:800">#INV-2024-0141</div><div style="font-size:11px;opacity:.85;margin-top:2px">${NAMES[1]} · Due Jan 15, 2024</div></div>
  <div class="card"><div style="font-size:11px;font-weight:700;color:#111;margin-bottom:8px">Line Items</div><div class="row" style="margin-bottom:5px"><span style="font-size:11px;color:#374151">${biz.inv}</span><span style="font-size:11px;font-weight:700">$160.00</span></div><div class="row" style="margin-bottom:5px"><span style="font-size:11px;color:#374151">${biz.s2}</span><span style="font-size:11px;font-weight:700">$85.00</span></div><div class="row" style="margin-bottom:5px"><span style="font-size:11px;color:#374151">${biz.s3}</span><span style="font-size:11px;font-weight:700">$40.00</span></div><div class="row" style="margin-bottom:5px"><span style="font-size:11px;color:#374151">Tax (8.5%)</span><span style="font-size:11px;font-weight:700">$24.38</span></div><div class="divider"/><div class="row"><span style="font-size:13px;font-weight:800">Total</span><span style="font-size:20px;font-weight:800;color:#b91c1c">$309.38</span></div></div>
  <div class="card" style="margin-bottom:12px"><div style="background:#fee2e2;border-radius:10px;padding:10px;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#b91c1c">⚠ Overdue by 15 days</div></div><div class="btn-row"><div class="btn btn-r" style="padding:10px">Collect Payment Now</div></div><div class="btn-row"><div class="btn">Send SMS Reminder</div><div class="btn">Send Email</div></div></div>`;
  scr.appendChild(s1);
  // S3 Collect
  const s2=document.createElement('div');s2.className='scr';
  s2.innerHTML=`<div style="padding:10px 14px;background:#fff;border-bottom:1px solid #e5e7eb"><div style="font-size:12px;font-weight:700">Collect Payment</div><div style="font-size:10px;color:#6b7280;margin-top:1px">${NAMES[1]} · #INV-2024-0141</div></div>
  <div class="card"><div style="text-align:center;padding:8px 0 12px"><div style="font-size:11px;color:#6b7280;font-weight:600;margin-bottom:4px">Amount Due</div><div style="font-size:38px;font-weight:800;color:#111">$309.38</div><div style="font-size:10px;color:#b91c1c;margin-top:2px">15 days overdue</div></div><div style="font-size:11px;font-weight:700;color:#111;margin-bottom:8px">Payment Method</div><div style="display:flex;flex-direction:column;gap:6px"><div style="background:#fff3ee;border:2px solid #f85520;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><div><div style="font-size:12px;font-weight:700;color:#f85520">Credit / Debit Card</div><div style="font-size:10px;color:#6b7280">Tap to pay or manual entry</div></div></div><div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><div><div style="font-size:12px;font-weight:700;color:#374151">Cash</div><div style="font-size:10px;color:#6b7280">Record cash payment</div></div></div><div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07"/></svg><div><div style="font-size:12px;font-weight:700;color:#374151">SMS Payment Link</div><div style="font-size:10px;color:#6b7280">Send link to customer</div></div></div></div></div>
  <div style="margin:10px 12px 12px;background:linear-gradient(135deg,#f85520,#ff7340);color:#fff;border-radius:12px;padding:12px;text-align:center;font-size:14px;font-weight:800;box-shadow:0 6px 20px rgba(248,85,32,.35)">Collect $309.38</div>`;
  scr.appendChild(s2);
  // S4 Success
  const s3=document.createElement('div');s3.className='scr';
  s3.innerHTML=`<div class="success-screen"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#22c55e);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px rgba(22,163,74,.3)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div style="font-size:20px;font-weight:800;margin-bottom:4px">Payment Received!</div><div style="font-size:30px;font-weight:800;color:#16a34a;margin-bottom:8px">$309.38</div><div style="font-size:13px;color:#6b7280;line-height:1.6;margin-bottom:20px">${NAMES[1]} paid by card. Receipt sent via SMS and email.</div><div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;width:100%;text-align:left;margin-bottom:12px"><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Receipt</div><div class="row" style="margin-bottom:4px"><span style="font-size:11px;color:#374151">Invoice</span><span style="font-size:11px;font-weight:700">#INV-2024-0141</span></div><div class="row" style="margin-bottom:4px"><span style="font-size:11px;color:#374151">Amount</span><span style="font-size:11px;font-weight:700;color:#16a34a">$309.38</span></div><div class="row" style="margin-bottom:4px"><span style="font-size:11px;color:#374151">Method</span><span style="font-size:11px;font-weight:700">Card ••4872</span></div><div class="row"><span style="font-size:11px;color:#374151">Status</span><span style="font-size:11px;font-weight:700;color:#15803d">✓ Paid</span></div></div><div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;width:100%;font-size:11px;color:#15803d;font-weight:600;text-align:left">✓ Invoice closed · Receipt emailed · Balance cleared</div></div>`;
  scr.appendChild(s3);
}
build();
const scrs=document.querySelectorAll('.scr'),dots=document.querySelectorAll('.dot'),lbl=document.getElementById('slbl');
let cur=0,stepTimer=null;
function showStep(n){if(stepTimer){clearTimeout(stepTimer);stepTimer=null;}scrs[cur].classList.remove('active');dots[cur].classList.remove('on');cur=n;scrs[cur].classList.add('active');dots[cur].classList.add('on');lbl.textContent='Step '+(cur+1)+' of '+scrs.length+' · '+LABELS[cur];window.parent.postMessage({step:cur+1,total:scrs.length},'*');if(cur<scrs.length-1){stepTimer=setTimeout(function(){showStep(cur+1);},3800);}else{stepTimer=setTimeout(function(){window.parent.postMessage({tourComplete:true},'*');},3800);}}
document.body.addEventListener('click',function(){if(cur<scrs.length-1)showStep(cur+1);});
showStep(0);
</script>
</body>
</html>
