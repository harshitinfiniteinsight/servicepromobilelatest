<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Pro 911 – Your App Tour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #f85520;
      --accent:  #ff7340;
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --white:   #fff;
      --bg:      #f9fafb;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff8f5 0%, #ffeee6 42%, #fdf4ff 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 48px;
      color: var(--text);
    }

    /* ── Outer card ── */
    .card {
      width: 100%;
      max-width: 1200px;
      background: var(--white);
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.11), 0 4px 16px rgba(0,0,0,.06);
      padding: 24px 28px 28px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 6px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: grid; place-items: center;
      color: #fff; font-weight: 800; font-size: 13px;
      box-shadow: 0 4px 12px rgba(248,85,32,.35);
    }
    .brand-name { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
    .brand-name span { color: var(--primary); }
    .top-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chip {
      background: #fff3ee; border: 1px solid #ffd4c4;
      color: var(--primary); border-radius: 999px;
      padding: 6px 12px; font-size: 11px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .progress-mini {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); font-weight: 600;
    }
    .progress-dots { display: flex; gap: 5px; }
    .progress-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: background .3s;
    }
    .progress-dots span.done { background: var(--primary); }
    .progress-dots span.active { background: var(--primary); box-shadow: 0 0 0 3px rgba(248,85,32,.2); }

    .greet {
      font-size: 13px; color: var(--muted);
      margin-bottom: 18px; margin-top: 4px;
    }
    .greet strong { color: var(--text); }

    /* ── 3-column layout ── */
    .stage {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      gap: 18px;
      align-items: start;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 18px;
    }

    /* ── LEFT: step list ── */
    .step-list { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; max-height: 580px; }
    .step-list-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
      margin-bottom: 8px;
    }
    .step-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
      border: 1.5px solid transparent;
      flex-shrink: 0;
    }
    .step-item.active {
      background: #fff3ee;
      border-color: #ffd4c4;
    }
    .step-item:hover:not(.active) { background: #f3f4f6; }

    .step-icon-wrap {
      width: 30px; height: 30px; flex-shrink: 0;
      border-radius: 9px;
      background: #f3f4f6;
      display: grid; place-items: center;
      transition: background .2s;
    }
    .step-item.active .step-icon-wrap { background: var(--primary); }
    .step-item.done .step-icon-wrap { background: #dcfce7; }
    .step-icon-wrap svg { width: 15px; height: 15px; color: #9ca3af; }
    .step-item.active .step-icon-wrap svg { color: #fff; }
    .step-item.done  .step-icon-wrap svg { color: #16a34a; }

    .step-text-wrap { flex: 1; min-width: 0; }
    .step-name { font-size: 12px; font-weight: 600; color: var(--muted); line-height: 1.3; }
    .step-item.active .step-name { color: var(--primary); }
    .step-item.done  .step-name { color: #374151; }
    .step-tag {
      display: inline-block; margin-top: 3px;
      font-size: 10px; font-weight: 600;
      background: #f3f4f6; color: #9ca3af;
      border-radius: 4px; padding: 1px 6px;
    }
    .step-item.active .step-tag { background: rgba(248,85,32,.12); color: var(--primary); }

    /* auto-play bar at bottom of step list */
    .auto-bar-wrap {
      margin-top: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .auto-bar-track {
      flex: 1; height: 4px; background: #e5e7eb; border-radius: 99px; overflow: hidden;
    }
    .auto-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 99px;
      width: 0%;
      transition: width linear;
    }
    .auto-bar-label { font-size: 10px; color: var(--muted); font-weight: 500; white-space: nowrap; }

    /* ── CENTER: phone ── */
    .phone-col { display: flex; justify-content: center; align-items: flex-start; }
    .device-frame {
      background: #111827;
      width: 310px;
      height: 650px;
      border-radius: 42px;
      padding: 13px;
      box-shadow: 0 24px 70px rgba(0,0,0,.22), 0 6px 18px rgba(0,0,0,.12);
      position: relative;
      flex-shrink: 0;
    }
    .notch {
      position: absolute; top: 7px; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 20px;
      border-radius: 12px; background: #050505; z-index: 3;
    }
    .device-screen {
      width: 100%; height: 100%;
      background: #fff; border-radius: 30px; overflow: hidden;
    }
    iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* ── RIGHT: feature detail card ── */
    .detail-col { display: flex; flex-direction: column; gap: 14px; }

    .feat-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      animation: fadeSlide .35s ease both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .feat-icon-bg {
      width: 52px; height: 52px; border-radius: 14px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .feat-icon-bg svg { width: 26px; height: 26px; }

    .feat-header { display: flex; align-items: center; gap: 12px; }
    .feat-title-wrap {}
    .feat-num { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .feat-title { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -.02em; margin-top: 2px; }

    .feat-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }

    .feat-bullets { display: flex; flex-direction: column; gap: 8px; }
    .feat-bullet {
      display: flex; align-items: flex-start; gap: 9px;
      font-size: 12.5px; color: #374151; line-height: 1.45;
    }
    .bullet-dot {
      width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center; margin-top: 1px;
    }
    .bullet-dot svg { width: 10px; height: 10px; color: #fff; }

    .feat-tagline {
      font-size: 12.5px;
      font-style: italic;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .feat-badge {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 8px; padding: 6px 10px;
      font-size: 11px; font-weight: 700;
      width: fit-content;
    }
    .feat-badge svg { width: 13px; height: 13px; }

    .btn-live {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; border: 1.5px solid var(--primary); color: var(--primary);
      background: #fff3ee; border-radius: 9px; padding: 8px 12px;
      font-size: 11px; font-weight: 700; text-decoration: none;
      transition: background .18s, box-shadow .18s;
    }
    .btn-live:hover { background: #ffe8df; box-shadow: 0 2px 8px rgba(248,85,32,.18); }
    .btn-live svg { width: 13px; height: 13px; }

    /* next-up preview */
    .next-up {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .next-up-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: var(--white); border: 1px solid var(--border);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .next-up-icon svg { width: 15px; height: 15px; color: var(--muted); }
    .next-up-text {}
    .next-up-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .next-up-name { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 1px; }

    /* ── Bottom actions ── */
    .actions {
      margin-top: 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .btn {
      height: 42px; padding: 0 18px; border-radius: 10px; border: 0;
      font-weight: 700; font-size: 13px; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 6px 18px rgba(248,85,32,.32);
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-light { color: #374151; background: #f3f4f6; border: 1px solid var(--border); }
    .btn-skip { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

    @media (max-width: 1060px) {
      .stage { grid-template-columns: 200px 1fr 240px; gap: 14px; }
    }
    @media (max-width: 780px) {
      .stage { grid-template-columns: 1fr; }
      .phone-col { order: -1; }
      .device-frame { width: 100%; max-width: 340px; height: 580px; }
    }
  </style>
</head>

const ALL_FEATURE_KEYS = ['jobs', 'customers', 'documents', 'payments', 'sell', 'appointments', 'tracking', 'teamSync', 'accounting', 'inventory'];

const BIZ_FEATURE_SETS = {
  hvac:          ['jobs', 'documents', 'payments', 'sell', 'inventory', 'customers', 'tracking', 'appointments', 'teamSync', 'accounting'],
  plumbing:      ['jobs', 'documents', 'payments', 'sell', 'inventory', 'customers', 'appointments', 'tracking', 'teamSync', 'accounting'],
  electrical:    ['jobs', 'tracking', 'payments', 'sell', 'accounting', 'customers', 'documents', 'appointments', 'teamSync', 'inventory'],
  carpentry:     ['jobs', 'documents', 'payments', 'sell', 'inventory', 'customers', 'appointments', 'tracking', 'teamSync', 'accounting'],
  exterminators: ['jobs', 'appointments', 'payments', 'documents', 'customers', 'tracking', 'sell', 'teamSync', 'accounting', 'inventory'],
  landscaping:   ['jobs', 'appointments', 'tracking', 'inventory', 'sell', 'customers', 'documents', 'payments', 'teamSync', 'accounting'],
  cleaning:      ['jobs', 'appointments', 'customers', 'payments', 'teamSync', 'tracking', 'documents', 'sell', 'accounting', 'inventory'],
  painter:       ['jobs', 'documents', 'payments', 'customers', 'appointments', 'tracking', 'sell', 'teamSync', 'accounting', 'inventory'],
  construction:  ['jobs', 'documents', 'payments', 'tracking', 'teamSync', 'customers', 'appointments', 'sell', 'accounting', 'inventory'],
  roofing:       ['jobs', 'documents', 'payments', 'tracking', 'accounting', 'customers', 'appointments', 'sell', 'teamSync', 'inventory'],
  general:       ['jobs', 'customers', 'payments', 'sell', 'accounting', 'appointments', 'documents', 'tracking', 'teamSync', 'inventory'],
  other:         ['jobs', 'customers', 'payments', 'sell', 'accounting', 'appointments', 'documents', 'tracking', 'teamSync', 'inventory'],
};

const BIZ_INLINE = {
  hvac: 'HVAC',
  plumbing: 'plumbing',
  electrical: 'electrical',
  carpentry: 'carpentry',
  exterminators: 'pest control',
  landscaping: 'landscaping',
  cleaning: 'cleaning',
  painter: 'painting',
  construction: 'construction',
  roofing: 'roofing',
  general: '',
  other: '',
};

// ── Business type labels ──
const BIZ_LABELS = {
  hvac:'AC / HVAC', plumbing:'Plumbing', electrical:'Electric',
  carpentry:'Carpentry', exterminators:'Exterminators', landscaping:'Landscapers',
  cleaning:'Cleaning', painter:'Painter', construction:'Construction',
  roofing:'Roofing', general:'General Service', other:'Your Business',
};

// ── Load saved data ──
const bizType    = localStorage.getItem('ob_biz_type') || 'general';
const bizName    = localStorage.getItem('ob_business') || '';
const userName   = localStorage.getItem('ob_name')     || '';
const featureSet = BIZ_FEATURE_SETS[bizType] || BIZ_FEATURE_SETS.general;

function personalise(str) {
  if (bizType === 'general' || bizType === 'other' || !BIZ_INLINE[bizType]) {
    return str.replace(/\{biz\}/g, '').replace(/\s{2,}/g, ' ').trim();
  }
  return str.replace(/\{biz\}/g, BIZ_INLINE[bizType]);
}

// Personalise UI
document.getElementById('biz-chip').textContent = BIZ_LABELS[bizType] || 'Your App Tour';
if (bizName) {
  document.getElementById('biz-name-display').textContent = bizName;
} else {
  document.getElementById('greet-line').innerHTML =
    `Here's everything <strong>your ${BIZ_LABELS[bizType] || 'business'}</strong> gets with Service Pro 911.`;
}

// ── Build feature list ──
let currentIdx = 0;

function getFeature(idx) {
  const key = featureSet[idx];
  return ALL_FEATURES[key];
}

// Build left step list
function buildStepList() {
  const list = document.getElementById('step-list');
  list.innerHTML = '';
  featureSet.forEach((key, i) => {
    const f     = ALL_FEATURES[key];
    const pitch = f.pitch;
    const item  = document.createElement('div');
    item.className = 'step-item' + (i < currentIdx ? ' done' : '') + (i === currentIdx ? ' active' : '');
    item.innerHTML = `
      <div class="step-icon-wrap">${ICONS[f.icon]}</div>
      <div class="step-text-wrap">
        <div class="step-name">${personalise(pitch.title)}</div>
        <div class="step-tag">${i + 1} of ${featureSet.length}</div>
      </div>`;
    item.onclick = () => goTo(i);
    list.appendChild(item);
  });
  // scroll active item into view
  const activeItem = list.querySelector('.step-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Build right detail card
function buildDetailCard(idx) {
  const f     = getFeature(idx);
  const pitch = f.pitch;
  const wrap  = document.getElementById('feat-card-wrap');
  wrap.innerHTML = `
    <div class="feat-card">
      <div class="feat-header">
        <div class="feat-icon-bg" style="background:#fff3ee">
          <svg viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[f.icon].replace(/<svg[^>]*>|<\/svg>/g,'')}</svg>
        </div>
        <div class="feat-title-wrap">
          <div class="feat-num">Feature ${idx + 1} of ${featureSet.length}</div>
          <div class="feat-title">${personalise(pitch.title)}</div>
        </div>
      </div>
      <div class="feat-desc">${pitch.desc}</div>
      <div class="feat-bullets">
        ${pitch.bullets.map(b => `
          <div class="feat-bullet">
            <div class="bullet-dot" style="background:#f85520">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            ${b}
          </div>`).join('')}
      </div>
      <div class="feat-tagline">${pitch.tagline}</div>
      <a class="btn-live"
         href="/mobile-version.html?route=${encodeURIComponent(f.liveRoute)}&label=${encodeURIComponent(personalise(pitch.title))}"
         target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        See live in app
      </a>
      <div class="feat-badge" style="background:#fff3ee;color:#f85520">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Included in your plan
      </div>
    </div>`;
}

// Build "next up" preview
function buildNextUp(idx) {
  const nextIdx = (idx + 1) % featureSet.length;
  const f       = getFeature(nextIdx);
  const pitch   = f.pitch;
  document.getElementById('next-icon').innerHTML =
    `<svg viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[f.icon].replace(/<svg[^>]*>|<\/svg>/g,'')}</svg>`;
  document.getElementById('next-name').textContent = personalise(pitch.title);
}

// Navigate phone
function navigatePhone(route) {
  const iframe = document.getElementById('app-frame');
  // set auth so app loads correctly
  try {
    iframe.contentWindow.localStorage.setItem('isAuthenticated', 'true');
    iframe.contentWindow.localStorage.setItem('userType', 'merchant');
  } catch(e) {}
  iframe.src = route + '?t=' + Date.now();
}

// Go to feature
function goTo(idx) {
  currentIdx = idx;
  const f = getFeature(idx);
  buildStepList();
  buildDetailCard(idx);
  buildNextUp(idx);
  navigatePhone(f.route);
  resetBar();
}

// Reset bar when a new feature loads
function resetBar() {
  const bar   = document.getElementById('auto-bar');
  const label = document.getElementById('bar-label');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  label.textContent = 'Step 1 of 4';
}

// Advance bar when iframe reports step progress
window.addEventListener('message', (e) => {
  if (!e.data) return;
  const bar   = document.getElementById('auto-bar');
  const label = document.getElementById('bar-label');

  if (e.data.step !== undefined && e.data.total !== undefined) {
    const pct = Math.round((e.data.step / e.data.total) * 100);
    bar.style.transition = 'width 0.5s ease';
    bar.style.width = pct + '%';
    label.textContent = `Step ${e.data.step} of ${e.data.total}`;
  }

  if (e.data.tourComplete) {
    bar.style.transition = 'width 0.3s ease';
    bar.style.width = '100%';
    label.textContent = 'Next feature…';
    setTimeout(() => goTo((currentIdx + 1) % featureSet.length), 800);
  }
});

// ── Initialise ──
goTo(0);
</script>
</body>
</html>
