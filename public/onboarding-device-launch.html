<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Pro 911 App Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #f85520;
      --accent: #ff7340;
      --text: #1a1a1a;
      --muted: #6b7280;
      --white: #fff;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --shadow-card: 0 24px 64px rgba(0,0,0,.12), 0 4px 16px rgba(0,0,0,.06);
      --shadow-frame: 0 24px 70px rgba(0,0,0,.18), 0 6px 18px rgba(0,0,0,.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 48px;
      background: linear-gradient(135deg, #fff8f5 0%, #ffeee6 42%, #fdf4ff 100%);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 1140px;
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 28px 28px 34px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      box-shadow: 0 4px 14px rgba(248,85,32,.35);
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .brand-name span { color: var(--primary); }

    .chip {
      border: 1px solid #ffd4c4;
      background: #fff3ee;
      color: var(--primary);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .frame-wrap {
      width: 100%;
      min-height: 540px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f9fafb 0%, #f3f4f6 100%);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius-lg);
      padding: 24px;
      overflow: auto;
    }

    .device-frame {
      background: #111827;
      position: relative;
      box-shadow: var(--shadow-frame);
      overflow: hidden;
      transition: width .2s ease, height .2s ease, border-radius .2s ease;
    }

    .device-frame.mobile {
      width: 390px;
      height: 820px;
      border-radius: 42px;
      padding: 14px;
    }

    .device-frame.tablet {
      width: 1024px;
      max-width: 100%;
      height: 700px;
      border-radius: 28px;
      padding: 10px;
    }

    .notch {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 24px;
      border-radius: 16px;
      background: #050505;
      z-index: 3;
    }

    .device-frame.tablet .notch {
      width: 180px;
      height: 10px;
      top: 6px;
      border-radius: 8px;
      opacity: .75;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      border-radius: 28px;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      height: 44px;
      padding: 0 16px;
      border-radius: 10px;
      border: 0;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 6px 20px rgba(248,85,32,.35);
    }

    .btn-light {
      color: #374151;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }

    .hint {
      margin-top: 10px;
      color: #9ca3af;
      font-size: 12px;
    }

    @media (max-width: 1120px) {
      .device-frame.tablet {
        width: 900px;
      }
    }

    @media (max-width: 980px) {
      .device-frame.mobile {
        width: 360px;
        height: 760px;
      }
      .device-frame.tablet {
        width: 100%;
        height: 620px;
      }
    }

    @media (max-width: 640px) {
      .card { padding: 20px 16px 22px; border-radius: 20px; }
      .brand-name { font-size: 18px; }
      .chip { width: 100%; text-align: center; }
      .frame-wrap { min-height: 460px; padding: 12px; }
      .device-frame.mobile { width: 100%; max-width: 360px; height: 620px; border-radius: 28px; }
      .device-frame.tablet { height: 520px; border-radius: 18px; }
      iframe { border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="brand">
        <div class="brand-icon">SP</div>
        <div class="brand-name">Service<span>Pro</span> 911</div>
      </div>
      <div class="chip" id="device-chip">Loading device…</div>
    </div>

    <div class="sub" id="device-subtitle">Opening your selected app experience.</div>

    <div class="frame-wrap">
      <div class="device-frame mobile" id="device-frame">
        <div class="notch"></div>
        <iframe id="app-frame" title="Service Pro App"></iframe>
      </div>
    </div>

    <div class="actions">
      <a class="btn btn-primary" id="open-full" target="_blank" rel="noopener">Open full app</a>
      <a class="btn btn-light" href="/onboarding-step2.html">Back to device selection</a>
    </div>
    <div class="hint">If preview is blank, click "Open full app".</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const picked = (params.get('device') || localStorage.getItem('sp911_preferred_device') || 'mobile').toLowerCase();

    const map = {
      mobile: {
        label: 'Mobile selected',
        desc: 'Showing Service Pro 911 in a mobile layout.',
        src: '/',
        cls: 'mobile'
      },
      tablet: {
        label: 'Tablet selected',
        desc: 'Showing Service Pro 911 in a tablet layout.',
        src: '/',
        cls: 'tablet'
      }
    };

    const config = map[picked] || map.mobile;
    localStorage.setItem('sp911_preferred_device', picked in map ? picked : 'mobile');

    const chip = document.getElementById('device-chip');
    const sub = document.getElementById('device-subtitle');
    const frame = document.getElementById('device-frame');
    const iframe = document.getElementById('app-frame');
    const openFull = document.getElementById('open-full');

    // Pre-authenticate so the app opens directly to the dashboard
    localStorage.setItem('isAuthenticated', 'true');
    localStorage.setItem('userType', 'merchant');
    localStorage.removeItem('currentEmployeeId');

    chip.textContent = config.label;
    sub.textContent = config.desc;
    frame.className = 'device-frame ' + config.cls;
    iframe.src = config.src;
    openFull.href = config.src;
  </script>
</body>
</html>
