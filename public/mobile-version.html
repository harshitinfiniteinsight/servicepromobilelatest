<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Service Pro 911 – Live App Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #f85520;
      --accent:  #ff7340;
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --bg:      #f9fafb;
      --white:   #fff;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff8f5 0%, #ffeee6 42%, #fdf4ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 36px;
      color: var(--text);
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 10px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    .back-link:hover { opacity: .8; }
    .back-link svg { width: 15px; height: 15px; }

    .feature-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .live-badge {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Phone frame ── */
    .phone-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .device-frame {
      background: #111827;
      width: 320px;
      height: 660px;
      border-radius: 44px;
      padding: 14px;
      box-shadow: 0 32px 80px rgba(0,0,0,.28), 0 8px 24px rgba(0,0,0,.14);
      position: relative;
      flex-shrink: 0;
    }

    .notch {
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 20px;
      border-radius: 12px;
      background: #050505;
      z-index: 3;
    }

    .device-screen {
      width: 100%; height: 100%;
      background: #fff;
      border-radius: 32px;
      overflow: hidden;
    }

    iframe {
      width: 100%; height: 100%;
      border: 0;
      display: block;
    }

    /* ── Nav pills ── */
    .nav-section {
      width: 100%;
      max-width: 500px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 10px;
      text-align: center;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .nav-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      transition: all .2s;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      user-select: none;
    }
    .nav-pill svg {
      width: 18px; height: 18px;
      color: #9ca3af;
      transition: color .2s;
    }
    .nav-pill:hover {
      background: #fff3ee;
      border-color: #ffd4c4;
      color: var(--primary);
    }
    .nav-pill:hover svg { color: var(--primary); }
    .nav-pill.active {
      background: #fff3ee;
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(248,85,32,.18);
    }
    .nav-pill.active svg { color: var(--primary); }

    /* ── Open full app CTA ── */
    .cta-row {
      width: 100%;
      max-width: 500px;
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }
    .btn-open {
      flex: 1;
      height: 42px;
      border-radius: 11px;
      border: 0;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 6px 18px rgba(248,85,32,.32);
    }
    .btn-open:hover { filter: brightness(1.05); }
    .btn-open svg { width: 15px; height: 15px; }

    .btn-tour {
      height: 42px;
      border-radius: 11px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #374151;
      padding: 0 16px;
    }
    .btn-tour svg { width: 14px; height: 14px; }

    /* ── Brand watermark ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: grid; place-items: center;
      color: #fff; font-weight: 800; font-size: 11px;
    }
    .brand-name { font-size: 17px; font-weight: 800; letter-spacing: -.02em; }
    .brand-name span { color: var(--primary); }
  </style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">SP</div>
  <div class="brand-name">Service<span>Pro</span> 911</div>
</div>

<!-- Top bar -->
<div class="topbar">
  <a class="back-link" id="back-link" href="/onboarding-device-launch.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to tour
  </a>
  <div class="feature-label">
    <span id="feature-name">Live App</span>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</div>

<!-- Phone frame with live app -->
<div class="phone-wrap">
  <div class="device-frame">
    <div class="notch"></div>
    <div class="device-screen">
      <iframe id="app-iframe" title="Service Pro 911 Live App"></iframe>
    </div>
  </div>
</div>

<!-- Feature nav pills -->
<div class="nav-section">
  <div class="nav-label">Switch feature</div>
  <div class="nav-grid" id="nav-grid">

    <div class="nav-pill" data-route="/jobs" data-label="Jobs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="2" y1="11" x2="22" y2="11"/></svg>
      Jobs
    </div>

    <div class="nav-pill" data-route="/customers" data-label="Customers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Customers
    </div>

    <div class="nav-pill" data-route="/invoices" data-label="Payments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Payments
    </div>

    <div class="nav-pill" data-route="/agreements" data-label="Agreements">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11.08V8l-6-6H6a2 2 0 00-2 2v16a2 2 0 002 2h6"/><path d="M14 2v6h6"/><path d="M16 18l2 2 4-4"/></svg>
      Docs
    </div>

    <div class="nav-pill" data-route="/appointments/manage" data-label="Appointments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </div>

    <div class="nav-pill" data-route="/employees/tracking" data-label="Crew Tracking">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Tracking
    </div>

    <div class="nav-pill" data-route="/employees/schedule" data-label="Team Schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      Team
    </div>

    <div class="nav-pill" data-route="/reports" data-label="Revenue & Reports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </div>

    <div class="nav-pill" data-route="/inventory" data-label="Inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Inventory
    </div>

    <div class="nav-pill" data-route="/sales/sell-product" data-label="Sell on Device">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.97-1.69l1.48-8.31H6"/></svg>
      Sell
    </div>

  </div>
</div>

<!-- CTA buttons -->
<div class="cta-row">
  <a class="btn-open" href="/" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Open Full App
  </a>
  <a class="btn-tour" href="/onboarding-device-launch.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Tour
  </a>
</div>

<script>
// ── Pre-authenticate ──
localStorage.setItem('isAuthenticated', 'true');
localStorage.setItem('userType', 'merchant');
localStorage.removeItem('currentEmployeeId');

// ── Parse query params ──
const params  = new URLSearchParams(window.location.search);
let   route   = params.get('route') || '/jobs';
const label   = params.get('label') || 'Jobs';

// ── Update labels ──
document.getElementById('feature-name').textContent = label;
document.title = 'Live App – ' + label + ' – Service Pro 911';

// ── Back link: return to tour if referrer is tour ──
const backLink = document.getElementById('back-link');
if (document.referrer && document.referrer.includes('onboarding-device-launch')) {
  backLink.href = document.referrer;
}

// ── Load iframe ──
const iframe = document.getElementById('app-iframe');

function loadRoute(r) {
  // Try to set auth inside iframe first (same-origin only)
  try {
    iframe.contentWindow.localStorage.setItem('isAuthenticated', 'true');
    iframe.contentWindow.localStorage.setItem('userType', 'merchant');
  } catch(e) {}
  iframe.src = r + '?t=' + Date.now();
  route = r;
}

loadRoute(route);

// ── Nav pills ──
const pills = document.querySelectorAll('.nav-pill');

function setActive(r) {
  pills.forEach(p => {
    p.classList.toggle('active', p.dataset.route === r);
  });
}

// Mark initial active pill (match by route prefix for sub-routes)
pills.forEach(pill => {
  if (route === pill.dataset.route || route.startsWith(pill.dataset.route + '?')) {
    pill.classList.add('active');
  }
});

pills.forEach(pill => {
  pill.addEventListener('click', () => {
    const r = pill.dataset.route;
    const l = pill.dataset.label;
    document.getElementById('feature-name').textContent = l;
    setActive(r);
    loadRoute(r);
    // Update URL without full reload
    const url = new URL(window.location.href);
    url.searchParams.set('route', r);
    url.searchParams.set('label', l);
    window.history.replaceState({}, '', url.toString());
  });
});
</script>
</body>
</html>
