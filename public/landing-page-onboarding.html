<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Pro 911 - Landing Page Onboarding</title>
  <style>
    :root {
      --primary: #f85520;
      --accent: #ff7340;
      --dark: #141414;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --bg: #f7f7f7;
      --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 48px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    h1 { font-size: clamp(24px, 3vw, 36px); }
    p { color: var(--text-muted); font-size: 16px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      text-decoration: none;
      padding: 12px 18px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: all .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      box-shadow: 0 8px 20px rgba(248,85,32,.24);
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-outline {
      background: #fff;
      color: var(--text);
      border-color: #e5e7eb;
    }
    .card {
      position: relative;
      background: var(--white);
      border-radius: 16px;
      border: 1px solid #ececec;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    .footer-note {
      margin-top: 14px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .cta-overlay {
      position: absolute;
      left: 8.5%;
      top: 72.5%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 18px;
      background: rgba(255, 244, 239, 0.96);
      box-shadow: 0 10px 24px rgba(0,0,0,.10);
    }
    .cta-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: nowrap;
    }
    .btn-see-action {
      background: #ffffff;
      color: var(--primary);
      border: 1px solid rgba(248,85,32,.35);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      font-weight: 700;
      padding: 11px 16px;
    }
    .btn-trial {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: 1px solid transparent;
      box-shadow: 0 8px 18px rgba(248,85,32,.22);
      font-weight: 700;
      padding: 11px 16px;
    }
    .btn-demo-dark {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
      box-shadow: 0 8px 18px rgba(0,0,0,.14);
      font-weight: 700;
      padding: 11px 16px;
    }
    .btn-see-action:hover {
      background: #fff5f0;
      transform: translateY(-1px);
    }
    .btn-trial:hover,
    .btn-demo-dark:hover {
      transform: translateY(-1px);
    }
    @media (max-width: 900px) {
      .cta-overlay {
        left: 6.5%;
        top: 69%;
        gap: 10px;
        padding: 7px 8px;
      }
      .cta-row {
        gap: 10px;
      }
      .btn-trial,
      .btn-demo-dark,
      .btn-see-action {
        padding: 9px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Landing Page Onboarding</h1>
        <p>Preview of the uploaded onboarding image for the Service Pro 911 landing flow.</p>
      </div>
      <div style="display:flex; gap:10px;">
        <a class="btn btn-outline" href="/landing-page.html">Back to Landing Page</a>
        <a class="btn btn-primary" href="/">Open Home</a>
      </div>
    </div>

    <div class="card">
      <img src="/landing-page-preview.png" alt="Landing page onboarding preview" />
      <div class="cta-overlay">
        <div class="cta-row">
          <a class="btn btn-trial" href="/landing-page-onboarding.html">Start Free Trial</a>
          <a class="btn btn-demo-dark" href="/landing-page-onboarding.html">Book a Demo</a>
        </div>
        <a class="btn btn-see-action" href="/onboarding-welcome.html" target="_blank">See it in action</a>
      </div>
    </div>
    <div class="footer-note">Image source: uploaded file "Landing page.png".</div>
  </div>
</body>
</html>
