<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jobs – Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f9fafb;color:#1a1a1a;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#f85520,#ff7340);color:#fff;padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-weight:800;font-size:16px}.hdr-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700}
.step-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dots{display:flex;gap:5px}.dot{width:22px;height:4px;border-radius:99px;background:#e5e7eb;transition:background .3s}.dot.on{background:#f85520}
.step-lbl{font-size:10px;font-weight:700;color:#9ca3af}
.screens{flex:1;position:relative;overflow:hidden}
.scr{position:absolute;inset:0;overflow-y:auto;opacity:0;transition:opacity .45s;pointer-events:none;background:#f9fafb}
.scr.active{opacity:1;pointer-events:auto}
.card{background:#fff;border-radius:14px;margin:8px 12px 0;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f3f4f6}
.row{display:flex;align-items:center;justify-content:space-between}
.badge{border-radius:999px;padding:3px 8px;font-size:10px;font-weight:700}
.b-prog{background:#fef3c7;color:#b45309}.b-sched{background:#dbeafe;color:#1d4ed8}.b-done{background:#dcfce7;color:#15803d}.b-pay{background:#fce7f3;color:#be185d}
.muted{font-size:10px;color:#9ca3af}
.divider{border:none;border-top:1px solid #f3f4f6;margin:8px 0}
.btn-row{display:flex;gap:5px;margin-top:8px}
.btn{flex:1;border:1px solid #e5e7eb;background:#f9fafb;border-radius:8px;padding:6px;font-size:10px;font-weight:700;color:#374151;text-align:center}
.btn-p{background:#fff3ee;border-color:#ffd4c4;color:#f85520}.btn-g{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);background:#fff;border-bottom:1px solid #e5e7eb}
.stat{padding:9px;text-align:center;border-right:1px solid #e5e7eb}.stat:last-child{border-right:none}
.stat-n{font-size:17px;font-weight:800;color:#f85520}.stat-l{font-size:9px;color:#6b7280;font-weight:600}
.info-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.info-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px}
.success-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#22c55e);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px rgba(22,163,74,.3)}
.success-icon svg{width:32px;height:32px;color:#fff}
.btn-full{display:block;text-align:center;border-radius:12px;padding:12px;font-size:14px;font-weight:800;color:#fff;background:linear-gradient(135deg,#f85520,#ff7340);box-shadow:0 6px 20px rgba(248,85,32,.35);margin:10px 12px 0}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-title" id="hdr-title">Jobs</div><div class="hdr-btn">+ New Job</div></div>
<div class="step-bar">
  <div class="dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="step-lbl" id="slbl">Step 1 of 4</div>
</div>
<div class="screens" id="screens"></div>
<script>
localStorage.setItem('isAuthenticated','true');localStorage.setItem('userType','merchant');
const BIZ_DATA={hvac:{t:'HVAC',s1:'AC Service Call',s2:'Filter Replacement',s3:'Duct Inspection',s4:'Refrigerant Top-Up',s5:'Thermostat Install',job:'AC Service Call + Filter Replacement',inv:'AC Service (2hr labour)',check:['Replace MERV-11 air filter','Inspect ductwork for leaks','Check refrigerant levels','Test thermostat calibration']},plumbing:{t:'Plumbing',s1:'Pipe Repair',s2:'Drain Cleaning',s3:'Leak Detection',s4:'Water Heater Service',s5:'Bathroom Refit',job:'Pipe Repair + Drain Cleaning',inv:'Pipe Repair (2hr labour)',check:['Locate and isolate pipe leak','Replace damaged pipe section','Clear drain blockage','Test water pressure and flow']},electrical:{t:'Electrical',s1:'Panel Inspection',s2:'Wiring Repair',s3:'Outlet Installation',s4:'Circuit Breaker Replace',s5:'LED Upgrade',job:'Panel Inspection + Wiring Repair',inv:'Electrical Inspection (2hr labour)',check:['Inspect main panel for faults','Replace faulty circuit breaker','Test all GFCI outlets','Verify grounding throughout']},landscaping:{t:'Landscaping',s1:'Lawn Mowing',s2:'Garden Maintenance',s3:'Tree Trimming',s4:'Irrigation Setup',s5:'Mulch Spreading',job:'Lawn Mowing + Garden Maintenance',inv:'Lawn Mowing (2hr)',check:['Mow and edge all grass areas','Prune overgrown shrubs','Clear garden beds of weeds','Check and adjust irrigation heads']},cleaning:{t:'Cleaning',s1:'Deep Clean',s2:'Carpet Steam Clean',s3:'Move-Out Clean',s4:'Office Cleaning',s5:'Window Cleaning',job:'Deep Clean + Carpet Steam Clean',inv:'Deep Clean Service (3hr)',check:['Vacuum and mop all floors','Clean bathrooms and kitchen','Steam clean carpeted areas','Wipe all surfaces and fixtures']},carpentry:{t:'Carpentry',s1:'Cabinet Install',s2:'Door Repair',s3:'Deck Build',s4:'Trim Finish',s5:'Custom Shelving',job:'Cabinet Install + Trim Finish',inv:'Cabinet Installation (3hr labour)',check:['Measure and mark cabinet positions','Secure wall cleats for upper cabinets','Install base cabinets level','Attach doors and hardware']},exterminators:{t:'Pest Control',s1:'Termite Treatment',s2:'Rodent Control',s3:'Ant Extermination',s4:'Bed Bug Treatment',s5:'Spider Control',job:'Termite Treatment + Ant Extermination',inv:'Termite Treatment (2hr)',check:['Inspect perimeter for entry points','Apply termite bait stations','Treat ant trails and nests','Check rodent trap placements']},painter:{t:'Painting',s1:'Interior Paint',s2:'Exterior Paint',s3:'Cabinet Refinish',s4:'Deck Staining',s5:'Drywall Repair',job:'Interior Paint + Drywall Repair',inv:'Interior Paint (4hr labour)',check:['Prepare surfaces and fill holes',"Apply painter's tape to edges",'Roll first coat evenly','Apply second coat after drying']},construction:{t:'Construction',s1:'Site Prep',s2:'Foundation Work',s3:'Framing',s4:'Concrete Pour',s5:'Structural Inspection',job:'Site Prep + Foundation Work',inv:'Foundation Work (day rate)',check:['Grade and level site area','Excavate foundation footings','Pour concrete and set forms','Inspect curing and levelness']},roofing:{t:'Roofing',s1:'Roof Inspection',s2:'Shingle Replacement',s3:'Gutter Cleaning',s4:'Leak Repair',s5:'Full Re-Roof',job:'Roof Inspection + Shingle Replacement',inv:'Roof Inspection (2hr)',check:['Inspect roof decking for damage','Remove and replace damaged shingles','Check flashing around chimney','Clear gutters and downspouts']},general:{t:'Service',s1:'Service Call',s2:'Maintenance Visit',s3:'Repair Work',s4:'Installation',s5:'Inspection',job:'Service Call + Maintenance Visit',inv:'Service Call (2hr labour)',check:['Diagnose root cause of issue','Gather required tools and parts','Complete repair or maintenance task','Test and confirm resolution']},other:{t:'Service',s1:'Service Call',s2:'Maintenance Visit',s3:'Repair Work',s4:'Installation',s5:'Inspection',job:'Service Call + Maintenance Visit',inv:'Service Call (2hr labour)',check:['Diagnose root cause of issue','Gather required tools and parts','Complete repair or maintenance task','Test and confirm resolution']}};
const bizType=localStorage.getItem('ob_biz_type')||'general';
const biz=BIZ_DATA[bizType]||BIZ_DATA.general;
const bizName=localStorage.getItem('ob_business')||'';
document.getElementById('hdr-title').textContent='Jobs';

const LABELS=['Job Board','Job Detail','Mark Complete','Invoice Sent'];
const NAMES=['Emma Davis','Robert Miller','Sarah Johnson'];
const ADDRS=['321 Elm St, Aurora','654 Maple Dr, Joliet','456 Oak Ave, Chicago'];
const TECHS=[['MJ','Mike Johnson','#f85520'],['TW','Tom Wilson','#0891b2'],['CD','Chris Davis','#16a34a']];
const CAL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></svg>';

function jcard(id,name,addr,svc,badgeCls,badgeTxt,tech,btns){
  return`<div class="card"><div class="row"><div class="muted">#${id}</div><span class="badge ${badgeCls}">${badgeTxt}</span></div><div style="font-size:13px;font-weight:700;margin:4px 0 1px">${name}</div><div style="font-size:11px;color:#6b7280;margin-bottom:5px">${svc}</div><div style="display:flex;gap:8px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:3px;font-size:10px;color:#9ca3af">${CAL}Today, 10:00 AM</div><div style="display:flex;align-items:center;gap:3px;font-size:10px;color:#9ca3af">${PIN}${addr}</div></div><div style="display:flex;align-items:center;gap:5px;margin-top:5px"><div style="width:20px;height:20px;border-radius:6px;background:${tech[2]};display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff">${tech[0]}</div><span style="font-size:10px;color:#6b7280">${tech[1]}</span></div><div class="btn-row">${btns}</div></div>`;
}

function build(){
  const scr=document.getElementById('screens');
  // S1
  const s0=document.createElement('div');s0.className='scr';
  s0.innerHTML=`<div class="stat-row"><div class="stat"><div class="stat-n">5</div><div class="stat-l">Scheduled</div></div><div class="stat"><div class="stat-n">3</div><div class="stat-l">In Progress</div></div><div class="stat"><div class="stat-n">28</div><div class="stat-l">Completed</div></div></div>${jcard('JOB-2847',NAMES[0],ADDRS[0],biz.job,'b-prog','In Progress',TECHS[0],'<div class="btn btn-p">View Job</div><div class="btn">Invoice</div><div class="btn">Photos</div>')}${jcard('JOB-2846',NAMES[1],ADDRS[1],biz.s1+' (scheduled)','b-sched','Scheduled',TECHS[1],'<div class="btn btn-p">View Job</div><div class="btn">Reschedule</div>')}${jcard('JOB-2845',NAMES[2],ADDRS[2],biz.s3,'b-pay','Pending Payment',TECHS[2],'<div class="btn btn-p">Collect Payment</div><div class="btn">Invoice</div>')}`;
  scr.appendChild(s0);
  // S2
  const s1=document.createElement('div');s1.className='scr';
  s1.innerHTML=`<div class="card"><div class="row" style="margin-bottom:8px"><div><div class="muted">#JOB-2847</div><div style="font-size:15px;font-weight:800;margin-top:2px">${NAMES[0]}</div></div><span class="badge b-prog">In Progress</span></div><div class="info-row"><div class="info-icon" style="background:#fff3ee"><svg viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="1.8" style="width:15px;height:15px"><rect x="2" y="7" width="20" height="14" rx="2"/><line x1="2" y1="11" x2="22" y2="11"/></svg></div><div><div style="font-size:11px;font-weight:700;color:#111">${biz.s1}</div><div style="font-size:10px;color:#6b7280">${biz.s2} · ${biz.s3}</div></div></div><div class="info-row"><div class="info-icon" style="background:#eff6ff"><svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" style="width:15px;height:15px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div style="font-size:11px;font-weight:700;color:#111">Today, 10:00 AM – 12:00 PM</div><div style="font-size:10px;color:#6b7280">2-hour estimated duration</div></div></div><div class="info-row" style="margin-bottom:0"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#f85520,#ff7340);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">MJ</div><div><div style="font-size:11px;font-weight:700;color:#111">Mike Johnson</div><div style="font-size:10px;color:#6b7280">Lead Technician · En route</div></div></div></div><div class="card"><div style="font-size:11px;font-weight:700;color:#111;margin-bottom:8px">Service Checklist</div><div style="display:flex;flex-direction:column;gap:6px">${biz.check.map((c,i)=>`<div style="display:flex;align-items:center;gap:8px"><div style="width:16px;height:16px;border-radius:50%;background:${i<2?'#22c55e':'#f59e0b'};display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">${i<2?'<polyline points="20 6 9 17 4 12"/>':'<circle cx="12" cy="12" r="8"/>'}</svg></div><span style="font-size:11px;color:${i<2?'#374151':'#6b7280'}">${c}</span></div>`).join('')}</div></div><div class="card" style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:#111;margin-bottom:6px">Customer Notes</div><div style="font-size:11px;color:#6b7280;line-height:1.6">"Please arrive before 10:30 AM. Use back entrance. Gate code: 4421."</div><div class="btn-row" style="margin-top:10px"><div class="btn btn-p">Add Photos</div><div class="btn">Add Note</div></div></div>`;
  scr.appendChild(s1);
  // S3
  const s2=document.createElement('div');s2.className='scr';
  s2.innerHTML=`<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:40px;height:40px;border-radius:12px;background:#fff3ee;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><line x1="2" y1="11" x2="22" y2="11"/></svg></div><div><div style="font-size:13px;font-weight:800">#JOB-2847 · ${NAMES[0]}</div><div style="font-size:10px;color:#6b7280">${biz.s1}</div></div></div><div style="font-size:11px;font-weight:700;color:#111;margin-bottom:8px">Mark job as complete?</div><div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:#15803d;margin-bottom:4px">All checklist items done</div><div style="font-size:10px;color:#16a34a">✓ ${biz.check[0]} · ✓ ${biz.check[1]}</div></div><div style="font-size:11px;color:#6b7280;line-height:1.5;margin-bottom:10px">Completing the job will update its status and prompt you to send an invoice to the customer.</div><div class="btn-row"><div class="btn btn-g" style="padding:10px;font-size:12px">✓ Mark Complete</div></div></div><div class="card"><div style="font-size:11px;font-weight:700;color:#111;margin-bottom:6px">Service photos</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px"><div style="height:56px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div style="height:56px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div style="height:56px;border-radius:8px;background:#fff3ee;border:1.5px dashed #ffd4c4;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f85520" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div></div></div><div class="btn-full" style="margin-bottom:12px">Complete &amp; Send Invoice</div>`;
  scr.appendChild(s2);
  // S4
  const s3=document.createElement('div');s3.className='scr';
  s3.innerHTML=`<div class="success-screen"><div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div style="font-size:20px;font-weight:800;margin-bottom:8px">Job Complete!</div><div style="font-size:13px;color:#6b7280;line-height:1.6;margin-bottom:20px">Job #2847 marked complete. Invoice sent to ${NAMES[0]}.</div><div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;width:100%;text-align:left;margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Invoice Summary</div><div class="row" style="margin-bottom:4px"><span style="font-size:11px;color:#374151">${biz.inv}</span><span style="font-size:11px;font-weight:700">$120.00</span></div><div class="row" style="margin-bottom:4px"><span style="font-size:11px;color:#374151">${biz.s2}</span><span style="font-size:11px;font-weight:700">$85.00</span></div><div class="row" style="margin-bottom:4px"><span style="font-size:11px;color:#374151">${biz.s3}</span><span style="font-size:11px;font-weight:700">$80.00</span></div><div style="border-top:1px solid #e5e7eb;margin:8px 0"></div><div class="row"><span style="font-size:13px;font-weight:800">Total</span><span style="font-size:18px;font-weight:800;color:#f85520">$285.00</span></div></div><div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;width:100%;font-size:11px;color:#15803d;font-weight:600;text-align:left">✓ Invoice delivered · Payment link sent via SMS</div></div>`;
  scr.appendChild(s3);
}
build();

const scrs=document.querySelectorAll('.scr'),dots=document.querySelectorAll('.dot'),lbl=document.getElementById('slbl');
let cur=0,stepTimer=null;
function showStep(n){if(stepTimer){clearTimeout(stepTimer);stepTimer=null;}scrs[cur].classList.remove('active');dots[cur].classList.remove('on');cur=n;scrs[cur].classList.add('active');dots[cur].classList.add('on');lbl.textContent='Step '+(cur+1)+' of '+scrs.length+' · '+LABELS[cur];window.parent.postMessage({step:cur+1,total:scrs.length},'*');if(cur<scrs.length-1){stepTimer=setTimeout(function(){showStep(cur+1);},3800);}else{stepTimer=setTimeout(function(){window.parent.postMessage({tourComplete:true},'*');},3800);}}
document.body.addEventListener('click',function(){if(cur<scrs.length-1)showStep(cur+1);});
showStep(0);
</script>
</body>
</html>
