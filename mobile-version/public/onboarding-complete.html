<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're All Set – Service Pro 911</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #f85520; --accent: #ff7340; --success: #16a34a;
      --text: #1a1a1a; --text-muted: #6b7280;
      --white: #ffffff; --radius-sm: 8px; --radius-xl: 28px;
      --shadow-card: 0 24px 64px rgba(0,0,0,.12), 0 4px 16px rgba(0,0,0,.06);
      --transition: .18s ease;
    }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
      background: linear-gradient(135deg, #fff8f5 0%, #ffeee6 40%, #fdf4ff 100%);
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; opacity: .35; pointer-events: none; z-index: 0;
    }
    body::before { width: 500px; height: 500px; background: radial-gradient(circle, #f8552033 0%, transparent 70%); top: -80px; left: -120px; }
    body::after  { width: 400px; height: 400px; background: radial-gradient(circle, #c084fc22 0%, transparent 70%); bottom: -60px; right: -80px; }
    .card {
      position: relative; z-index: 1;
      background: var(--white); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 56px 48px 52px; width: 100%; max-width: 520px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      animation: slideUp .45s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(32px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .progress-wrap { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 44px; }
    .progress-label { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; text-transform: uppercase; letter-spacing: .06em; }
    .progress-bar-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 99px; }

    .success-ring {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 0 14px rgba(22,163,74,.08);
      animation: pop .55s cubic-bezier(.22,.68,0,1.4) .25s both;
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .success-ring svg { width: 42px; height: 42px; stroke: var(--success); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .success-title { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -.03em; margin-bottom: 12px; }
    .success-sub { font-size: 15px; color: var(--text-muted); line-height: 1.65; max-width: 360px; margin-bottom: 36px; }

    .feature-pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 40px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 99px;
      background: #fff3ee; border: 1px solid rgba(248,85,32,.18);
      font-size: 13px; font-weight: 600; color: var(--primary);
    }
    .pill svg { width: 13px; height: 13px; stroke: var(--primary); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-dashboard {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 15px 36px; background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; text-decoration: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 700; letter-spacing: .01em;
      box-shadow: 0 6px 22px rgba(248,85,32,.35);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .btn-dashboard:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(248,85,32,.4); }
    .btn-dashboard svg { width: 17px; height: 17px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    @media (max-width: 560px) {
      .card { padding: 40px 24px 44px; }
      .success-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="progress-wrap">
      <span class="progress-label">Step 3 of 3</span>
      <div class="progress-bar-track"><div class="progress-bar-fill"></div></div>
    </div>

    <div class="success-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <h1 class="success-title">You're all set! 🎉</h1>
    <p class="success-sub">Your Service Pro 911 account is ready. Start managing jobs, collecting payments, and growing your business.</p>

    <div class="feature-pills">
      <span class="pill"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Estimates</span>
      <span class="pill"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</span>
      <span class="pill"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Live Routing</span>
      <span class="pill"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Invoices</span>
    </div>

    <a href="/" class="btn-dashboard">
      Go to Dashboard
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>
</body>
</html>
